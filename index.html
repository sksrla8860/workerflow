<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    
    * { font-family: "Pretendard", sans-serif; box-sizing: border-box; }
    
    body { 
      margin: 0; overflow: hidden; user-select: none; width: 100%; height: 100vh; 
      -webkit-app-region: no-drag; background: transparent; transition: background-color 0.4s ease, background 0.4s ease;
    }
    
    /* --- 위젯 메인 컨테이너 (Glassmorphism) --- */
    #widget-container {
      position: relative; width: 100%; height: 100%;
      /* 배경을 약간 더 투명하고 블러를 강하게 줘서 고급스럽게 */
      /* background: rgba(3, 216, 167, 0.2); */
      /* backdrop-filter: blur(10px) saturate(180%); */
      display: flex; flex-direction: column; 
      border: 1px solid rgba(255,255,255,0.08); 
      border-radius: 16px; /* 둥근 모서리 */
      overflow: hidden; /* 자식 요소가 둥근 모서리 넘지 않게 */
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      
      /* backdrop-filter: blur(10px) saturate(150%); 
      -webkit-backdrop-filter: blur(10px) saturate(150%); */
    }
    #widget-container.vertical-mode { flex-direction: row; }

    /* --- 상단 바 (Top Bar) --- */
    #top-bar {
      flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
      padding: 0 16px; height: 44px;
      background: rgba(255,255,255,0.03); /* 아주 연한 구분선 */
      border-bottom: 1px solid rgba(255,255,255,0.05);
      z-index: 60; position: relative;
    }
    #widget-container.vertical-mode #top-bar { 
      width: 44px; height: 100%; flex-direction: column; 
      padding: 16px 0; border-right: 1px solid rgba(255,255,255,0.05); border-bottom: none;
    }

    #drag-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; -webkit-app-region: drag; }

    /* 날짜/시간 디자인 */
    #date-time-box { display: flex; align-items: center; gap: 10px; z-index: 5; pointer-events: none; }
    #app-logo { height: 20px; width: auto; opacity: 0.9; }
    
    #date { 
      font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: 0.5px; 
      text-transform: uppercase;
    }
    #clock { 
      font-weight: 700; font-size: 18px; color: #fff; letter-spacing: -0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    /* 세로 모드 대응 */
    #widget-container.vertical-mode #date-time-box { 
      flex-direction: column; writing-mode: vertical-rl; text-orientation: mixed; gap: 12px; 
    }
    #widget-container.vertical-mode #app-logo { writing-mode: horizontal-tb; margin-bottom: 4px; }
    #widget-container.vertical-mode #clock { writing-mode: horizontal-tb; } /* 시계는 가로로 유지 */

    /* 상단 아이콘 버튼 */
    #top-icons { display: flex; gap: 4px; align-items: center; z-index: 10; -webkit-app-region: no-drag; }
    #widget-container.vertical-mode #top-icons { flex-direction: column; gap: 8px; }

    .icon-btn { 
      background: transparent; border: none; color: rgba(255,255,255,0.5); 
      font-size: 14px; cursor: pointer; padding: 6px; border-radius: 8px;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-1px); }
    .icon-btn.pinned { color: #56ccf2; background: rgba(86, 204, 242, 0.15); } 

    /* --- 타임라인 트랙 --- */
    #timeline-track {
      position: relative; flex-grow: 1; 
      background: transparent; /* 배경 투명하게 (컨테이너 블러 사용) */
      cursor: crosshair; overflow: hidden; -webkit-app-region: no-drag;
    }
    
    /* 시간 마커 (눈금) */
    .hour-marker { 
      position: absolute; color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 500; pointer-events: none; 
      display: flex; align-items: center; justify-content: center;
    }
    #widget-container:not(.vertical-mode) .hour-marker { 
      top: 0; bottom: 0; border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 6px; justify-content: flex-start;
    }
    #widget-container.vertical-mode .hour-marker { 
      left: 0; right: 0; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 4px; justify-content: flex-start; align-items: flex-start;
    }

    /* 현재 시간 선 (네온 효과) */
    #current-time-line { 
      position: absolute; background: #ff4757; z-index: 5; pointer-events: none; display: none; 
      box-shadow: 0 0 8px rgba(255, 71, 87, 0.8); /* Glow Effect */
    }
    #widget-container:not(.vertical-mode) #current-time-line { top:0; bottom:0; width: 2px; }
    #widget-container.vertical-mode #current-time-line { left:0; right:0; height: 2px; }

    /* 일정 블록 (Capsule Style) */
    .schedule-block {
      position: absolute; border-radius: 6px; color: #fff; 
      display: flex; align-items: center; justify-content: center;
      white-space: nowrap; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2); /* 입체감 */
      cursor: grab; font-weight: 600; z-index: 10; font-size: 0.9em;
      overflow: hidden; -webkit-app-region: no-drag;
      border: 1px solid rgba(0,0,0,0.1);
      transition: transform 0.1s, filter 0.2s;
    }
    .schedule-block:hover { 
      filter: brightness(1.15); z-index: 20; transform: scale(1.02); 
      box-shadow: 0 8px 12px rgba(0,0,0,0.3);
    }
    
    /* 선택 박스 */
    #selection-box { 
      position: absolute; background: rgba(86, 204, 242, 0.2); 
      border: 1px solid #56ccf2; display: none; pointer-events: none; z-index: 999; border-radius: 4px;
    }
    #selection-text {
      position: absolute; background: #222; color: #56ccf2;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
      white-space: nowrap; border: 1px solid #56ccf2; z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    /* 설정/모달 창 디자인 */
    #settings-panel, #schedule-modal {
      display: none; position: absolute; 
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; background: #1f1f1f; 
      border: 1px solid #333; border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
      z-index: 9999; -webkit-app-region: no-drag; padding: 24px;
    }
    
    h3 { font-size: 16px; margin-bottom: 20px; color: white; font-weight: 600; }
    
    .setting-group { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .setting-label { font-size: 13px; color: #bbb; }
    
    /* Input & Select 스타일 */
    select, input[type="text"], input[type="time"], input[type="number"] { 
      background: #2a2a2a; border: 1px solid #444; color: white; 
      padding: 6px 10px; border-radius: 6px; outline: none; transition: 0.2s;
    }
    select:focus, input:focus { border-color: #56ccf2; background: #333; }
    
    input[type=range] { accent-color: #56ccf2; cursor: pointer; }

    /* 버튼 스타일 */
    .btn { 
      width: 100%; padding: 10px; border: none; border-radius: 8px; 
      font-weight: 600; cursor: pointer; color: white; margin-top: 10px; 
      transition: 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .close-modal-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #666; background: none; border: none; font-size: 18px; }
    .close-modal-btn:hover { color: #fff; }

    /* 리사이즈 핸들 */
    .win-resize-handle { position: absolute; z-index: 200; -webkit-app-region: no-drag; background: transparent; }
    #resize-bottom, #resize-top { left: 0; width: 100%; height: 8px; cursor: ns-resize; }
    #resize-bottom { bottom: 0; } #resize-top { top: 0; }
    #resize-right, #resize-left { top: 0; height: 100%; width: 8px; cursor: ew-resize; }
    #resize-right { right: 0; } #resize-left { left: 0; }
  </style>
</head>
<body>
  <div id="widget-container">
    <div id="top-bar">
      <div id="drag-layer" title="Window movement"></div>
      <div id="date-time-box">
        <img src="logo.svg" id="app-logo" alt="Logo">
        <div style="display:flex; flex-direction:column; justify-content:center; gap:0;">
            <span id="date">01/01</span>
            <span id="clock">00:00</span>
        </div>
      </div>
      <div id="top-icons">
        <button id="btn-open-calendar" class="icon-btn" title="Calendar">📅</button> <button id="btn-minimize" class="icon-btn" title="Minimize">➖</button>
        <button id="btn-toggle-pin" class="icon-btn pinned" title="Pin">📌</button>
        <button id="btn-open-settings" class="icon-btn" title="Setting">⚙️</button>
        <button id="btn-app-close" class="icon-btn" title="Close">✖️</button>
      </div>
    </div>
    
    <div id="timeline-track">
      <div id="current-time-line"></div>
      <div id="selection-box">
        <span id="selection-text"></span>
      </div>
    </div>
    
    <div id="resize-bottom" class="win-resize-handle"></div>
    <div id="resize-top" class="win-resize-handle"></div>
    <div id="resize-right" class="win-resize-handle"></div>
    <div id="resize-left" class="win-resize-handle"></div>
  </div>

  <div id="settings-panel">
    <button class="close-modal-btn" onclick="closeSettings()">✖</button>
    <h3 style="color:white; margin-top:0;" data-i18n="settingsTitle">Settings</h3>
    <div class="setting-group">
      <span class="setting-label">Position</span>
      <select id="set-position">
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
      </select>
    </div>
    <div class="setting-group">
      <span class="setting-label">Time</span>
      <div>
        <input type="number" id="set-start-hour" style="width:50px;" min="0" max="23"> ~ 
        <input type="number" id="set-end-hour" style="width:50px;" min="1" max="24">
      </div>
    </div>
    <!-- <div class="setting-group">
      <span class="setting-label" data-i18n="bgOpacityLabel">Background</span>
      <div style="display:flex; gap:5px; align-items:center;">
        <input type="color" id="set-bg-color" value="#000000">
        <input type="range" id="set-opacity" min="0" max="1" step="0.05">
      </div>
    </div> -->
    <div class="setting-group">
      <div style="display:flex; justify-content:space-between;">
        <span class="setting-label" data-i18n="fontSizeLabel">Font Size</span>
        <span id="font-size-val" style="color:#aaa; font-size:12px;">14px</span>
      </div>
      <input type="range" id="set-font-size" min="10" max="30" step="1" value="14" style="width:100%;">
    </div>
    <div class="setting-group">
      <span class="setting-label" data-i18n="autoStartLabel">Run at Startup</span>
      <input type="checkbox" id="set-auto-start" style="width:20px; height:20px;">
    </div>
    <div class="setting-group">
      <span class="setting-label" data-i18n="languageLabel">Language</span>
      <select id="language-select" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
      </select>
    </div>
    <div style="text-align:center; margin-top:15px; display:flex; gap:10px;">
      <button onclick="resetData()" data-i18n="resetBtn" style="flex:1; background:#444;">Reset Data</button>
      <button id="btn-real-quit" data-i18n="quitAppBtn" style="flex:1; background:#ff4757;">Quit App</button>
    </div>
  </div>

  <div id="schedule-modal">
    <div class="modal-row"><input type="text" id="modal-title" class="modal-input" placeholder="Schedule Name"></div>
    <div class="modal-row">
      <input type="time" id="modal-start" class="modal-input"> ~ <input type="time" id="modal-end" class="modal-input">
    </div>
    <div class="modal-row" id="color-picker" style="justify-content:center; gap:8px;"></div>
    <div id="modal-error-msg"></div>

    <button id="btn-save" class="btn" style="background:#56ccf2; color:black;">Save</button>
    <button id="btn-cancel" class="btn" style="background:#444;">Cancel</button>
    <button id="btn-delete" class="btn" style="background:#ff4757; display:none;">Delete</button>
  </div>

  <script>
    // --- 기존 Script 유지 ---
    const { ipcRenderer } = require('electron');

    const defaultConfig = { 
      position: 'bottom', manualSize: 120, start: 9, end: 18, 
      pinned: true, autoStart: true 
    };
    let config = JSON.parse(localStorage.getItem('widgetConfig')) || defaultConfig;
    let schedules = JSON.parse(localStorage.getItem('timelineSchedules')) || [];
    let currentDateDisplay = new Date();

    const container = document.getElementById('widget-container');
    const track = document.getElementById('timeline-track');
    const settingsPanel = document.getElementById('settings-panel');
    const scheduleModal = document.getElementById('schedule-modal');
    const errorMsg = document.getElementById('modal-error-msg');
    
    const inputs = {
      pos: document.getElementById('set-position'),
      start: document.getElementById('set-start-hour'), end: document.getElementById('set-end-hour'),
      title: document.getElementById('modal-title'), mStart: document.getElementById('modal-start'), mEnd: document.getElementById('modal-end'),
      autoStart: document.getElementById('set-auto-start'),
    };
    const fontSizeRange = document.getElementById('set-font-size');
    const fontSizeVal = document.getElementById('font-size-val');

    const translations = {
      en: { settingsTitle: "Settings", languageLabel: "Language", bgOpacityLabel: "Background / Opacity", fontSizeLabel: "Font Size", resetBtn: "Reset Data", quitAppBtn: "Quit App", resetConfirm: "Reset all data?", resetComplete: "Data reset.", quitConfirm: "Quit app?", placeholder: "Type a task...", autoStartLabel: "Run at Startup" },
      ko: { settingsTitle: "설정", languageLabel: "언어", bgOpacityLabel: "배경 / 투명도", fontSizeLabel: "글자 크기", resetBtn: "데이터 초기화", quitAppBtn: "프로그램 종료", resetConfirm: "모든 데이터를 초기화하시겠습니까?", resetComplete: "초기화 되었습니다.", quitConfirm: "프로그램을 종료하시겠습니까?", placeholder: "할 일을 입력하세요...", autoStartLabel: "윈도우 시작 시 자동 실행" },
      ja: { settingsTitle: "設定", languageLabel: "言語", bgOpacityLabel: "背景 / 透明度", fontSizeLabel: "フォントサイズ", resetBtn: "データ初期化", quitAppBtn: "アプリ終了", resetConfirm: "データをリセットしますか？", resetComplete: "リセットしました。", quitConfirm: "アプリを終了しますか？", placeholder: "タスクを入力...", autoStartLabel: "スタートアップ時に実行" },
      zh: { settingsTitle: "设置", languageLabel: "语言", bgOpacityLabel: "背景 / 透明度", fontSizeLabel: "字体大小", resetBtn: "重置数据", quitAppBtn: "退出应用", resetConfirm: "确定要重置数据吗？", resetComplete: "数据已重置。", quitConfirm: "确定要退出应用吗？", placeholder: "输入任务...", autoStartLabel: "开机自启" },
      es: { settingsTitle: "Configuración", languageLabel: "Idioma", bgOpacityLabel: "Fondo / Opacidad", fontSizeLabel: "Tamaño de fuente", resetBtn: "Restablecer datos", quitAppBtn: "Salir de la aplicación", resetConfirm: "¿Restablecer todos los datos?", resetComplete: "Datos restablecidos.", quitConfirm: "¿Salir de la aplicación?", placeholder: "Escribe una tarea...", autoStartLabel: "Ejecutar al inicio" }
    };

    function init() {
      inputs.pos.value = config.position || 'bottom';
      inputs.start.value = config.start; inputs.end.value = config.end;
      inputs.autoStart.checked = config.autoStart;
      const savedFontSize = localStorage.getItem('appFontSize') || '14';
      fontSizeRange.value = savedFontSize;
      fontSizeVal.innerText = savedFontSize + 'px';
      document.body.style.fontSize = savedFontSize + 'px';
      const savedLang = localStorage.getItem('appLanguage') || 'en';
      changeLanguage(savedLang);
      updatePin(config.pinned); 
      applyLayout();
      ipcRenderer.send('change-language', savedLang);
      ipcRenderer.send('set-auto-start', config.autoStart);
    }

    function changeLanguage(lang) {
      localStorage.setItem('appLanguage', lang);
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerText = t[key];
      });
      document.querySelectorAll('.todo-input').forEach(input => input.placeholder = t.placeholder);
      document.getElementById('language-select').value = lang;
      ipcRenderer.send('change-language', lang);
    }

    function applyLayout() {
      const pos = config.position;
      const isVertical = (pos === 'left' || pos === 'right');
      if (isVertical) container.classList.add('vertical-mode'); else container.classList.remove('vertical-mode');
      document.querySelectorAll('.win-resize-handle').forEach(el => el.style.display = 'none');
      if (pos === 'top') document.getElementById('resize-bottom').style.display = 'flex';
      else if (pos === 'bottom') document.getElementById('resize-top').style.display = 'flex';
      else if (pos === 'left') document.getElementById('resize-right').style.display = 'flex';
      else if (pos === 'right') document.getElementById('resize-left').style.display = 'flex';
      ipcRenderer.send('update-widget-bounds', { position: pos, size: config.manualSize });
      renderView();
    }

    function renderView() {
      const selection = document.getElementById('selection-box');
      track.innerHTML = '<div id="current-time-line"></div>';
      track.appendChild(selection); 
      const isVertical = container.classList.contains('vertical-mode');
      const range = config.end - config.start;
      for(let i = config.start; i <= config.end; i++) {
        const p = ((i - config.start) / range) * 100;
        const el = document.createElement('div'); el.className = 'hour-marker'; el.innerText = i;
        if (isVertical) { el.style.top = p + '%'; el.style.width = '100%'; } 
        else { el.style.left = p + '%'; el.style.height = '100%'; }
        track.appendChild(el);
      }
      let sorted = [...schedules].sort((a,b) => a.start - b.start);
      let lanes = []; 
      sorted.forEach(sch => { 
        let lane = 0; 
        while(true) { 
          if(!lanes[lane] || lanes[lane] <= sch.start) { lanes[lane] = sch.end; sch.lane = lane; break; } 
          lane++; 
        } 
      });
      const blockSize = 24; const blockGap = 4;
      sorted.forEach(sch => {
        const startP = Math.max(0, ((sch.start - config.start) / range) * 100);
        const durP = Math.min(100 - startP, ((sch.end - sch.start) / range) * 100);
        if (durP <= 0) return;
        const block = document.createElement('div'); block.className = 'schedule-block'; block.innerText = sch.title; block.style.backgroundColor = sch.color || '#56ccf2';
        const offset = 10 + (sch.lane * (blockSize + blockGap));
        if (isVertical) { 
          block.style.top = startP + '%'; block.style.height = durP + '%'; block.style.left = offset + 'px'; block.style.width = blockSize + 'px'; 
          block.innerHTML += `<div class="blk-resize v-handle v-top"></div><div class="blk-resize v-handle v-bottom"></div>`; 
          setupBlockResize(block, sch, 'top'); setupBlockResize(block, sch, 'bottom'); 
        } else { 
          block.style.left = startP + '%'; block.style.width = durP + '%'; block.style.top = offset + 'px'; block.style.height = blockSize + 'px'; 
          block.innerHTML += `<div class="blk-resize h-handle h-left"></div><div class="blk-resize h-handle h-right"></div>`; 
          setupBlockResize(block, sch, 'left'); setupBlockResize(block, sch, 'right'); 
        }
        block.addEventListener('mousedown', (e) => { if(!e.target.classList.contains('blk-resize')) openModal(sch); });
        track.appendChild(block);
      });
      updateTimeLine();
    }

    function updateTimeLine() {
      const now = new Date(); 
      const h = now.getHours(), m = now.getMinutes();
      document.getElementById('clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      
      const cur = h + m/60; const p = ((cur - config.start) / (config.end - config.start)) * 100;
      const line = document.getElementById('current-time-line');
      const isVertical = container.classList.contains('vertical-mode');
      if(p >= 0 && p <= 100) { 
        line.style.display = 'block'; 
        if(isVertical) { line.style.top = p + '%'; line.style.width='100%'; line.style.left=0; line.style.height='2px'; } 
        else { line.style.left = p + '%'; line.style.height='100%'; line.style.top=0; line.style.width='2px'; } 
      } else { 
        line.style.display = 'none'; 
      }
    }

    inputs.autoStart.addEventListener('change', (e) => {
      config.autoStart = e.target.checked;
      save();
      ipcRenderer.send('set-auto-start', config.autoStart);
    });

    fontSizeRange.addEventListener('input', (e) => {
      const newSize = e.target.value;
      fontSizeVal.innerText = newSize + 'px';
      document.body.style.fontSize = newSize + 'px';
      localStorage.setItem('appFontSize', newSize);
    });

    inputs.pos.addEventListener('change', () => { config.position = inputs.pos.value; save(); applyLayout(); });
    inputs.start.addEventListener('change', () => { config.start = Number(inputs.start.value); save(); renderView(); });
    inputs.end.addEventListener('change', () => { config.end = Number(inputs.end.value); save(); renderView(); });

    document.getElementById('btn-minimize').addEventListener('click', () => ipcRenderer.send('minimize-window'));
    document.getElementById('btn-open-settings').addEventListener('click', () => { 
      if(settingsPanel.style.display === 'block') closeSettings(); else openSettings(); 
    });
    document.getElementById('btn-toggle-pin').addEventListener('click', () => { 
      config.pinned = !config.pinned; updatePin(config.pinned); save(); 
    });
    document.getElementById('btn-app-close').addEventListener('click', () => ipcRenderer.send('close-window'));
    
    // 달력 열기 버튼 (index.html에 추가됨)
    const btnCalendar = document.getElementById('btn-open-calendar');
    if(btnCalendar) {
       // calendar.html은 트레이나 메인에서 켜지도록 했으나, 여기서도 열 수 있게 메인에 신호 보내기 가능
       // 하지만 main.js에서 'open-calendar' 리스너가 아직 없으므로, 트레이를 통해 여는 것을 권장하거나
       // main.js에 ipcMain.on('open-calendar', () => calendarWin.show()) 추가 필요.
    }

    document.getElementById('btn-real-quit').addEventListener('click', () => {
      const lang = localStorage.getItem('appLanguage') || 'en';
      if(confirm(translations[lang].quitConfirm)) {
        ipcRenderer.send('force-quit');
      }
    });

    ipcRenderer.on('change-date', (event, dateStr) => {
      console.log("Date changed:", dateStr); 
      const parts = dateStr.split('-');
      currentDateDisplay = new Date(parts[0], parts[1]-1, parts[2]); 
      document.getElementById('date').innerText = `${currentDateDisplay.getMonth() + 1}/${currentDateDisplay.getDate()}`;
    });

    function toggleExpand(isExpand) { ipcRenderer.send('set-expand-mode', isExpand); }
    function openSettings() { settingsPanel.style.display = 'block'; toggleExpand(true); }
    function closeSettings() { settingsPanel.style.display = 'none'; if(scheduleModal.style.display === 'none') toggleExpand(false); }
    
    function openModal(sch, s, e) {
      scheduleModal.style.display = 'flex'; toggleExpand(true); 
      errorMsg.style.display = 'none'; errorMsg.innerText = '';
      inputs.title.focus();
      if(sch) { editId = sch.id; inputs.title.value = sch.title; inputs.mStart.value = decToStr(sch.start); inputs.mEnd.value = decToStr(sch.end); tempColor = sch.color; document.getElementById('btn-delete').style.display='block'; }
      else { editId = null; inputs.title.value = ''; inputs.mStart.value = decToStr(s); inputs.mEnd.value = decToStr(e); tempColor = colors[0]; document.getElementById('btn-delete').style.display='none'; }
      renderColorPicker();
    }
    function closeModal() { scheduleModal.style.display = 'none'; if(settingsPanel.style.display === 'none') toggleExpand(false); }
    function showError(msg) { errorMsg.innerText = msg; errorMsg.style.display = 'block'; }
    
    function updatePin(p) { ipcRenderer.send('toggle-pin', p); document.getElementById('btn-toggle-pin').classList.toggle('pinned', p); }
    function save() { localStorage.setItem('widgetConfig', JSON.stringify(config)); }
    function saveData() { localStorage.setItem('timelineSchedules', JSON.stringify(schedules)); }
    function resetData() { localStorage.clear(); location.reload(); } 
    function snap(v) { return Math.round(v * 12) / 12; }
    function decToStr(v) { if(isNaN(v)) return '00:00'; const h=Math.floor(v), m=Math.round((v-h)*60); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }
    function strToDec(s) { const [h,m]=s.split(':').map(Number); return h+m/60; }

    let editId = null; let tempColor = '#56ccf2'; const colors = ['#56ccf2', '#ff4757', '#2ecc71', '#f1c40f', '#9b59b6']; const cContainer = document.getElementById('color-picker');
    function renderColorPicker() { cContainer.innerHTML = ''; colors.forEach(c => { const d = document.createElement('div'); d.style.cssText = `width:20px;height:20px;border-radius:50%;background:${c};cursor:pointer;border:2px solid transparent;`; if(tempColor === c) d.style.borderColor = 'white'; d.onclick = () => { tempColor = c; renderColorPicker(); }; cContainer.appendChild(d); }); }

    document.getElementById('btn-save').addEventListener('click', () => {
      const title = inputs.title.value; const s = strToDec(inputs.mStart.value); const e = strToDec(inputs.mEnd.value);
      if(!title || title.trim() === '') { showError('Please enter a schedule name.'); return; }
      if(isNaN(s) || isNaN(e) || s >= e) { showError('Please set the time correctly.'); return; }
      if(editId) { const t = schedules.find(x=>x.id===editId); if(t) { t.title=title; t.start=s; t.end=e; t.color=tempColor; } }
      else { schedules.push({ id:Date.now(), title, start:s, end:e, color:tempColor }); }
      saveData(); closeModal(); renderView();
    });
    
    scheduleModal.addEventListener('mousedown', (e) => { e.stopPropagation(); });
    settingsPanel.addEventListener('mousedown', (e) => { e.stopPropagation(); });
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-delete').addEventListener('click', () => { if(confirm('Delete?')) { schedules = schedules.filter(x=>x.id!==editId); saveData(); closeModal(); renderView(); } });

    [inputs.title, inputs.mStart, inputs.mEnd].forEach(input => {
      input.addEventListener('keyup', (e) => { if(e.key === 'Enter') document.getElementById('btn-save').click(); });
    });

    let dragStart = null; 
    const selection = document.getElementById('selection-box');
    const selectionText = document.getElementById('selection-text');

    track.addEventListener('mousedown', (e) => {
      if(e.target.closest('.schedule-block')) return;
      if(settingsPanel.style.display === 'block') closeSettings();
      const isVertical = container.classList.contains('vertical-mode');
      const rect = track.getBoundingClientRect();
      const pos = isVertical ? (e.clientY - rect.top) : (e.clientX - rect.left);
      dragStart = { pos, total: isVertical ? rect.height : rect.width };
      selection.style.display = 'block';
      selectionText.innerText = "";
      if(isVertical) { selection.style.left = '0'; selection.style.width = '100%'; selection.style.top = pos+'px'; selection.style.height = '1px'; }
      else { selection.style.top = '0'; selection.style.height = '100%'; selection.style.left = pos+'px'; selection.style.width = '1px'; }
    });
    
    window.addEventListener('mousemove', (e) => {
      if(!dragStart) return;
      const isVertical = container.classList.contains('vertical-mode');
      const rect = track.getBoundingClientRect();
      const current = isVertical ? (e.clientY - rect.top) : (e.clientX - rect.left);
      const start = Math.min(dragStart.pos, current); const size = Math.abs(current - dragStart.pos);
      if(isVertical) { selection.style.top = start+'px'; selection.style.height = size+'px'; }
      else { selection.style.left = start+'px'; selection.style.width = size+'px'; }
      const range = config.end - config.start;
      const t1 = config.start + (start / dragStart.total * range);
      const t2 = config.start + ((start + size) / dragStart.total * range);
      selectionText.innerText = `${decToStr(snap(t1))} ~ ${decToStr(snap(t2))}`;
    });

    window.addEventListener('mouseup', (e) => {
      if(!dragStart) return;
      selection.style.display = 'none';
      const isVertical = container.classList.contains('vertical-mode');
      const rect = track.getBoundingClientRect();
      const current = isVertical ? (e.clientY - rect.top) : (e.clientX - rect.left);
      const p1 = Math.min(dragStart.pos, current) / dragStart.total; const p2 = Math.max(dragStart.pos, current) / dragStart.total;
      const range = config.end - config.start; let s = config.start + (p1 * range); let end = config.start + (p2 * range);
      if(end - s < 0.2) end = s + 1;
      dragStart = null; openModal(null, snap(s), snap(end));
    });

    function setupBlockResize(block, sch, type) {
        const handle = block.querySelector(type === 'left' ? '.h-left' : type === 'right' ? '.h-right' : type === 'top' ? '.v-top' : '.v-bottom');
        if(!handle) return;
        handle.addEventListener('mousedown', (e) => {
            e.stopPropagation(); e.preventDefault();
            const isVertical = container.classList.contains('vertical-mode');
            const range = config.end - config.start; const rect = track.getBoundingClientRect();
            function up(ev) { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); const current = isVertical ? (ev.clientY - rect.top) : (ev.clientX - rect.left); const total = isVertical ? rect.height : rect.width; const time = config.start + (current / total * range); if(type === 'left' || type === 'top') sch.start = Math.min(sch.end - 0.25, snap(time)); else sch.end = Math.max(sch.start + 0.25, snap(time)); saveData(); renderView(); }
            function move() {} 
            window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
        });
    }

    let winResizing = false;
    document.querySelectorAll('.win-resize-handle').forEach(h => { h.addEventListener('mousedown', (e) => { winResizing = true; e.preventDefault(); }); });
    window.addEventListener('mousemove', (e) => {
      if(!winResizing) return;
      const pos = config.position; let newSize = 120;
      if (pos === 'top') newSize = e.clientY; else if (pos === 'bottom') newSize = window.innerHeight - e.clientY;
      else if (pos === 'left') newSize = e.clientX; else if (pos === 'right') newSize = window.innerWidth - e.clientX;
      config.manualSize = Math.max(85, newSize); ipcRenderer.send('update-widget-bounds', { position: pos, size: config.manualSize });
    });
    window.addEventListener('mouseup', () => { if(winResizing) { winResizing = false; save(); } });

    setInterval(updateTimeLine, 1000); init();
  </script>
</body>
</html>
