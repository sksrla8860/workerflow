<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    
    :root {
      --accent-color: #56ccf2;
      --text-main: #ffffff;
      --text-sub: #rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; user-select: none; }

    body { 
      margin: 0; 
      /* 기본 배경은 투명, JS로 제어 */
      background: transparent; 
      color: var(--text-main); 
      overflow: hidden; 
      display: flex; flex-direction: column; height: 100vh; 
    }

    /* --- 메인 컨테이너 (글래스모피즘 효과 적용 대상) --- */
    #app-container {
      width: 100%; height: 100%;
      background: rgba(3, 216, 167, 0.2); /* 기본값 (JS로 덮어씌워짐) */
      /* backdrop-filter: blur(10px) saturate(150%); 🔥 리얼한 유리 효과 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* --- 상단 타이틀바 --- */
    #title-bar {
      height: 48px; 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 0 16px; -webkit-app-region: drag;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
    }
    .title-area { display: flex; align-items: center; gap: 10px; opacity: 0.9; }
    .title { font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
    
    .controls { -webkit-app-region: no-drag; display: flex; gap: 4px; }
    
    /* 공통 아이콘 버튼 스타일 */
    .icon-btn { 
      background: transparent; border: none; color: rgba(255,255,255,0.6); 
      cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.2s; 
      display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .icon-btn.active { color: var(--accent-color); background: rgba(86, 204, 242, 0.15); }

    /* --- 달력 영역 --- */
    #calendar-wrapper { flex: 1; padding: 20px; overflow-y: auto; }
    
    /* FullCalendar 커스텀 (투명도 유지) */
    .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255, 255, 255, 0.08); }
    .fc-toolbar-title { font-size: 20px !important; font-weight: 700; }
    .fc-button { 
      background: rgba(255, 255, 255, 0.05) !important; border: none !important; 
      color: white !important; font-size: 12px !important; font-weight: 600 !important;
      backdrop-filter: blur(5px);
    }
    .fc-button:hover { background: rgba(255, 255, 255, 0.15) !important; }
    .fc-button-active { background: var(--accent-color) !important; color: black !important; }
    
    .fc-daygrid-day:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
    .fc-col-header-cell-cushion { color: rgba(255,255,255,0.5); font-weight: normal; text-decoration: none; }
    .fc-daygrid-day-number { color: rgba(255,255,255,0.8); text-decoration: none; padding: 8px; }
    .fc-day-today { background: rgba(86, 204, 242, 0.05) !important; }
/* --- [추가/수정] 날짜 표시 디자인 --- */

    .fc-day-today { background: rgba(86, 204, 242, 0.1) !important; /* 액센트 컬러의 10% 투명도 */ position: relative; }
    .fc-day-today .fc-daygrid-day-top::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--accent-color); border-radius: 50%; }

    .fc-day-selected { background: rgba(86, 204, 242, 0.25) !important; /* 좀 더 진한 배경 */ box-shadow: inset 0 0 0 2px var(--accent-color) !important; /* 안쪽 테두리(Glow 효과) */ transition: all 0.2s ease; }
    .fc-daygrid-day:hover { background: rgba(255, 255, 255, 0.1) !important; cursor: pointer; }
    /* --- 설정 패널 (캘린더 전용) --- */
    #cal-settings {
      position: absolute; top: 55px; right: 16px; width: 260px;
      background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
      padding: 16px; display: none; z-index: 1000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .set-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .set-label { font-size: 12px; color: #ccc; }
    input[type=range] { width: 120px; accent-color: var(--accent-color); }
    input[type=color] { border: none; width: 30px; height: 30px; background: none; cursor: pointer; }
    .save-btn { width: 100%; padding: 8px; background: var(--accent-color); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px;}

  </style>
</head>
<body>

  <div id="app-container">
    <div id="title-bar">
      <div class="title-area">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#56ccf2"><path d="M19,4H18V2H16V4H8V2H6V4H5A2,2 0 0,0 3,6V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V6A2,2 0 0,0 19,4M19,20H5V10H19V20M19,8H5V6H19V8Z" /></svg>
        <span class="title">Calendar</span>
      </div>
      <div class="controls">
        <button id="btn-pin" class="icon-btn" title="Pin">
          <svg viewBox="0 0 24 24"><path d="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12Z" /></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24"><path d="M19.14,12.94C19.14,12.78 19.14,12.61 19.14,12.45C19.14,12.29 19.14,12.12 19.14,11.96L21.41,10.19C21.61,10.03 21.67,9.75 21.54,9.5L19.38,5.78C19.25,5.55 18.97,5.45 18.73,5.54L16.05,6.62C15.5,6.2 14.89,5.85 14.23,5.57L13.82,2.72C13.78,2.46 13.56,2.27 13.29,2.27H8.97C8.7,2.27 8.48,2.46 8.44,2.72L8.03,5.57C7.37,5.85 6.76,6.2 6.21,6.62L3.53,5.54C3.29,5.45 3.01,5.55 2.88,5.78L0.73,9.5C0.6,9.75 0.65,10.03 0.86,10.19L3.13,11.96C3.13,12.12 3.13,12.29 3.13,12.45C3.13,12.61 3.13,12.78 3.13,12.94L0.86,14.71C0.65,14.87 0.6,15.15 0.73,15.4L2.88,19.12C3.01,19.35 3.29,19.45 3.53,19.36L6.21,18.28C6.76,18.7 7.37,19.05 8.03,19.33L8.44,22.18C8.48,22.44 8.7,22.63 8.97,22.63H13.29C13.56,22.63 13.78,22.44 13.82,22.18L14.23,19.33C14.89,19.05 15.5,18.7 16.05,18.28L18.73,19.36C18.97,19.45 19.25,19.35 19.38,19.12L21.54,15.4C21.67,15.15 21.61,14.87 21.41,14.71L19.14,12.94M12.26,15.68C10.43,15.68 8.94,14.19 8.94,12.36C8.94,10.53 10.43,9.04 12.26,9.04C14.09,9.04 15.58,10.53 15.58,12.36C15.58,14.19 14.09,15.68 12.26,15.68Z" /></svg>
        </button>
        <button id="btn-min" class="icon-btn" title="Minimize">
          <svg viewBox="0 0 24 24"><path d="M19,13H5V11H19V13Z" /></svg>
        </button>
        <button id="btn-close" class="icon-btn" title="Close">
          <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" /></svg>
        </button>
      </div>
    </div>

    <div id="calendar-wrapper">
      <div id="calendar"></div>
    </div>
    
    <div id="cal-settings">
      <div style="margin-bottom:10px; font-weight:bold; font-size:13px; color:white;">Calendar Appearance</div>
      <div class="set-row">
        <span class="set-label">Opacity</span>
        <input type="range" id="set-opacity" min="0" max="1.0" step="0.05" value="0.2">
      </div>
      <div class="set-row">
        <span class="set-label">Tint Color</span>
        <input type="color" id="set-color" value="#000000">
      </div>
      <button class="save-btn" onclick="toggleSettings()">Close</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // 1. 설정값 관리
    const defaultConf = { opacity: 0.6, color: '#000000' };
    let conf = JSON.parse(localStorage.getItem('calendarConfig')) || defaultConf;
    
    const appContainer = document.getElementById('app-container');
    const opacityInput = document.getElementById('set-opacity');
    const colorInput = document.getElementById('set-color');
    const settingsPanel = document.getElementById('cal-settings');

    function applyStyles() {
      // 16진수 컬러 -> RGBA 변환
      const hex = conf.color;
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      appContainer.style.background = `rgba(${r}, ${g}, ${b}, ${conf.opacity})`;
      
      opacityInput.value = conf.opacity;
      colorInput.value = conf.color;
    }
    
    // 설정 변경 이벤트
    opacityInput.addEventListener('input', (e) => { conf.opacity = e.target.value; applyStyles(); localStorage.setItem('calendarConfig', JSON.stringify(conf)); });
    colorInput.addEventListener('input', (e) => { conf.color = e.target.value; applyStyles(); localStorage.setItem('calendarConfig', JSON.stringify(conf)); });

    function toggleSettings() {
      if(settingsPanel.style.display === 'block') settingsPanel.style.display = 'none';
      else settingsPanel.style.display = 'block';
    }

    // 2. 버튼 이벤트
    document.getElementById('btn-settings').addEventListener('click', toggleSettings);
    
    let isPinned = false;
    const btnPin = document.getElementById('btn-pin');
    btnPin.addEventListener('click', () => {
      isPinned = !isPinned;
      btnPin.classList.toggle('active', isPinned);
      ipcRenderer.send('toggle-pin', isPinned);
    });

    document.getElementById('btn-min').addEventListener('click', () => ipcRenderer.send('minimize-window'));
    document.getElementById('btn-close').addEventListener('click', () => ipcRenderer.send('close-window'));

    // 3. 달력 초기화
  document.addEventListener('DOMContentLoaded', function() {
    applyStyles(); 

    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      height: '100%',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      
      // 🔥 [수정] 날짜 클릭 이벤트
      dateClick: function(info) {
        console.log('Clicked:', info.dateStr);

        // 1. 기존에 선택된 날짜의 클래스 제거 (초기화)
        const prevSelected = document.querySelectorAll('.fc-day-selected');
        prevSelected.forEach(el => el.classList.remove('fc-day-selected'));

        // 2. 지금 클릭한 날짜(td 요소)에 클래스 추가
        // (info.dayEl이 클릭된 날짜의 HTML 요소입니다)
        info.dayEl.classList.add('fc-day-selected');

        // 3. 메인 프로세스로 날짜 전송
        ipcRenderer.send('date-clicked', info.dateStr);
      }
    });
    
    calendar.render();
  });
  </script>
</body>
</html>
