<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    * { font-family: "Pretendard", sans-serif; box-sizing: border-box; }

    body {
      margin: 0; user-select: none;
      width: 100%; height: 100vh;
      -webkit-app-region: no-drag;
      background: transparent !important; 
      box-sizing: border-box;
      overflow: hidden; /* 중복 제거 완료 */
    }

    /* ── 메인 컨테이너 ── */
    #widget-container {
      position: relative; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      
      background: rgba(30, 30, 30, 0.85); /* 중복 제거 완료 */
      border-radius: 12px; 
      overflow: hidden; /* 중복 제거 완료 */
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      border-left: 1px solid rgba(255, 255, 255, 0.20);
      border-right: 1px solid rgba(255, 255, 255, 0.15);
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }
    #widget-container.vertical-mode { flex-direction: row; }

    /* ── 상단 바 ── */
    #top-bar {
      flex-shrink: 0; display: flex;
      justify-content: space-between; align-items: center;
      padding: 0 16px; height: 44px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      z-index: 60; position: relative;
    }
    #widget-container.vertical-mode #top-bar {
      width: 44px; height: 100%; flex-direction: column;
      padding: 16px 0;
      border-right: 1px solid rgba(255,255,255,0.05); border-bottom: none;
    }

    #drag-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; -webkit-app-region: drag;
    }
    #custom-tooltip {
      position: absolute;
      background: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      pointer-events: none; /* 마우스 클릭을 방해하지 않도록 통과시킴 */
      opacity: 0;           /* 기본적으로 숨김 */
      transition: opacity 0.2s ease;
      z-index: 10000;       /* 무조건 최상단에 뜨도록 */
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      white-space: pre-wrap; /* 줄바꿈(\n) 인식 */
    }
    /* ── 날짜/시계 ── */
    #date-time-box {
      display: flex; align-items: center; gap: 10px;
      z-index: 5; pointer-events: none;
    }
    #app-logo { height: 20px; width: auto; opacity: 0.9; }
    #date {
      font-size: 12px; color: rgba(255,255,255,0.5);
      font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
    }
    #clock {
      font-weight: 700; font-size: 18px; color: #fff;
      letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    #widget-container.vertical-mode #date-time-box {
      flex-direction: column; writing-mode: vertical-rl; gap: 12px;
    }
    #widget-container.vertical-mode #app-logo { writing-mode: horizontal-tb; }
    #widget-container.vertical-mode #clock   { writing-mode: horizontal-tb; }

    /* ── 아이콘 버튼 ── */
    #top-icons {
      display: flex; gap: 4px; align-items: center;
      z-index: 10; -webkit-app-region: no-drag;
    }
    #widget-container.vertical-mode #top-icons { flex-direction: column; gap: 8px; }

    .icon-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.5);
      font-size: 14px; cursor: pointer; padding: 6px; border-radius: 8px;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-1px); }
    .icon-btn.pinned { color: #56ccf2; background: rgba(86,204,242,0.15); }

    /* ── 타임라인 ── */
    #timeline-track {
      position: relative; flex-grow: 1;
      background: transparent; cursor: crosshair;
      overflow: hidden; -webkit-app-region: no-drag;
    }

    .hour-marker {
      position: absolute; color: rgba(255,255,255,0.3);
      font-size: 10px; font-weight: 500; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    #widget-container:not(.vertical-mode) .hour-marker {
      top: 0; bottom: 0;
      border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 6px; justify-content: flex-start;
    }
    #widget-container.vertical-mode .hour-marker {
      left: 0; right: 0;
      border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 4px; align-items: flex-start; justify-content: flex-start;
    }

    /* ── 현재 시간선 ── */
    #current-time-line {
      position: absolute; background: #ff4757; z-index: 5;
      pointer-events: none; display: none;
      box-shadow: 0 0 8px rgba(255,71,87,0.8);
    }
    #widget-container:not(.vertical-mode) #current-time-line { top: 0; bottom: 0; width: 2px; }
    #widget-container.vertical-mode       #current-time-line { left: 0; right: 0; height: 2px; }

    /* ── 일정 블록 ── */
    .schedule-block {
      position: absolute; border-radius: 6px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      white-space: nowrap; overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
      cursor: pointer; font-weight: 600; z-index: 10; font-size: 0.9em;
      -webkit-app-region: no-drag; border: 1px solid rgba(0,0,0,0.1);
      transition: transform 0.1s, filter 0.2s;
    }
    .schedule-block:hover {
      filter: brightness(1.15); z-index: 20; transform: scale(1.02);
      box-shadow: 0 8px 12px rgba(0,0,0,0.3);
    }
    /* 구글 일정은 약간 투명 + 이탤릭으로 구분 */
    .schedule-block.google-event {
      opacity: 0.85;
      font-style: italic;
      cursor: default;
    }

    /* ── 선택 박스 ── */
    #selection-box {
      position: absolute; background: rgba(86,204,242,0.2);
      border: 1px solid #56ccf2; display: none;
      pointer-events: none; z-index: 999; border-radius: 4px;
    }
    #selection-text {
      position: absolute; background: #222; color: #56ccf2;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
      white-space: nowrap; border: 1px solid #56ccf2; z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    /* ── 설정 패널 ── */
    #settings-panel {
      display: none;
      position: fixed;
      top: 50px; 
      left: 50%;
      margin-left: -130px;
      width: 260px;
      background: #1f1f1f;
      border: 1px solid #333; border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      z-index: 9999; -webkit-app-region: no-drag;
      padding: 24px;
      max-height: calc(100vh - 70px);
      overflow-y: auto;
    }

    /* ── 일정 모달 ── */
    #schedule-modal {
      display: none;
      position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px;
      background: #1f1f1f;
      border: 1px solid #333; border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      z-index: 9999; -webkit-app-region: no-drag;
      padding: 24px;
      flex-direction: column; gap: 10px;
    }

    .modal-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .modal-row .modal-input { flex: 1; width: 100%; }

    #modal-error-msg { color: #ff4757; font-size: 12px; display: none; }

    #color-picker { display: flex; justify-content: center; gap: 10px; margin: 4px 0; }

    h3 { font-size: 16px; margin: 0 0 16px; color: white; font-weight: 600; }

    .setting-group {
      margin-bottom: 14px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .setting-group.column { flex-direction: column; align-items: flex-start; gap: 6px; }
    .setting-label { font-size: 13px; color: #bbb; }

    select, input[type="text"], input[type="time"], input[type="number"] {
      background: #2a2a2a; border: 1px solid #444; color: white;
      padding: 6px 10px; border-radius: 6px; outline: none; transition: 0.2s;
    }
    select:focus, input:focus { border-color: #56ccf2; background: #333; }
    input[type=range] { accent-color: #56ccf2; cursor: pointer; }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; color: white; margin-top: 6px;
      transition: 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .close-panel-btn {
      position: absolute; top: 15px; right: 15px;
      cursor: pointer; color: #666; background: none; border: none; font-size: 18px;
    }
    .close-panel-btn:hover { color: #fff; }

    /* ── [추가] 일정 블록 내부 리사이즈 핸들 ── */
    .blk-resize {
      position: absolute;
      z-index: 50;
      background: rgba(255,255,255,0.0); /* 기본은 투명 */
      -webkit-app-region: no-drag;       /* 창 드래그 방지 */
    }
    .blk-resize:hover {
      background: rgba(255,255,255,0.4); /* 마우스 올리면 살짝 하얗게 보임 */
    }
    /* 가로 모드용 핸들 */
    .h-handle { top: 0; bottom: 0; width: 6px; cursor: ew-resize; }
    .h-left   { left: 0; border-radius: 6px 0 0 6px; }
    .h-right  { right: 0; border-radius: 0 6px 6px 0; }

    /* 세로 모드용 핸들 */
    .v-handle { left: 0; right: 0; height: 6px; cursor: ns-resize; }
    .v-top    { top: 0; border-radius: 6px 6px 0 0; }
    .v-bottom { bottom: 0; border-radius: 0 0 6px 6px; }

    /* ── 리사이즈 핸들 ── */
    .win-resize-handle {
      position: absolute; z-index: 200;
      -webkit-app-region: no-drag; background: transparent;
    }
    #resize-bottom, #resize-top  { left: 0; width: 100%; height: 8px; cursor: ns-resize; }
    #resize-bottom { bottom: 0; }
    #resize-top    { top: 0; }
    #resize-right, #resize-left  { top: 0; height: 100%; width: 8px; cursor: ew-resize; }
    #resize-right  { right: 0; }
    #resize-left   { left: 0; }
  </style>
</head>
<body>

<div id="widget-container">
  <div id="top-bar">
    <div id="drag-layer" title="드래그하여 이동"></div>
    <div id="date-time-box">
      <img src="logo.svg" id="app-logo" alt="Logo">
      <div style="display:flex; flex-direction:column; gap:0;">
        <span id="date">01/01</span>
        <span id="clock">00:00</span>
      </div>
    </div>
    <div id="top-icons">
      <button id="btn-open-calendar" class="icon-btn" title="Calendar">📅</button>
      <!-- <button id="btn-toggle-pin" class="icon-btn pinned" title="Pin">📌</button> -->
      <button id="btn-open-settings" class="icon-btn" title="Settings">⚙️</button>
      <button id="btn-minimize" class="icon-btn" title="Minimize">➖</button>
      <button id="btn-app-close" class="icon-btn" title="Close">✖️</button>
    </div>
  </div>

  <div id="timeline-track">
    <div id="current-time-line"></div>
    <div id="selection-box"><span id="selection-text"></span></div>
  </div>

  <div id="resize-bottom" class="win-resize-handle"></div>
  <div id="resize-top"    class="win-resize-handle"></div>
  <div id="resize-right"  class="win-resize-handle"></div>
  <div id="resize-left"   class="win-resize-handle"></div>
</div>
<div id="custom-tooltip"></div>
<!-- 설정 패널 -->
<div id="settings-panel">
  <button class="close-panel-btn" onclick="closeSettings()">✖</button>
  <h3 data-i18n="settingsTitle">Settings</h3>

  <div class="setting-group">
    <span class="setting-label">Position</span>
    <select id="set-position">
      <option value="top">Top</option>
      <option value="bottom">Bottom</option>
      <option value="left">Left</option>
      <option value="right">Right</option>
    </select>
  </div>
  <div class="setting-group">
    <span class="setting-label">Time Range</span>
    <div style="display:flex; align-items:center; gap:6px;">
      <input type="number" id="set-start-hour" style="width:50px;" min="0" max="23">
      <span style="color:#666;">~</span>
      <input type="number" id="set-end-hour"   style="width:50px;" min="1" max="24">
    </div>
  </div>
  <div class="setting-group">
    <span class="setting-label" data-i18n="bgOpacityLabel">Background</span>
    <div style="display:flex; gap:6px; align-items:center;">
      <input type="color" id="set-bg-color" value="#03d8a7">
      <input type="range" id="set-opacity" min="0" max="1" step="0.05" style="width:80px;">
    </div>
  </div>
  <div class="setting-group column">
    <div style="display:flex; justify-content:space-between; width:100%;">
      <span class="setting-label" data-i18n="fontSizeLabel">Font Size</span>
      <span id="font-size-val" style="color:#aaa; font-size:12px;">14px</span>
    </div>
    <input type="range" id="set-font-size" min="10" max="30" step="1" value="14" style="width:100%;">
  </div>
  <div class="setting-group">
    <span class="setting-label" data-i18n="autoStartLabel">Run at Startup</span>
    <input type="checkbox" id="set-auto-start" style="width:20px; height:20px;">
  </div>
  <div class="setting-group">
    <span class="setting-label" data-i18n="languageLabel">Language</span>
    <select id="language-select">
      <option value="en">English</option>
      <option value="ko">한국어</option>
      <option value="ja">日本語</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
    </select>
  </div>

  <div style="display:flex; gap:8px; margin-top:12px;">
    <button onclick="resetData()" data-i18n="resetBtn"  style="flex:1; background:#444; border:none; border-radius:8px; color:#fff; padding:8px; cursor:pointer;">Reset</button>
    <button id="btn-real-quit" data-i18n="quitAppBtn"   style="flex:1; background:#ff4757; border:none; border-radius:8px; color:#fff; padding:8px; cursor:pointer;">Quit</button>
  </div>
</div>

<!-- 일정 모달 (로컬 일정 추가/수정) -->
<div id="schedule-modal">
  <button class="close-panel-btn" onclick="closeModal()">✖</button>
  <h3 id="modal-title-text">New Schedule</h3>
  <div class="modal-row">
    <input type="text" id="modal-title" class="modal-input" placeholder="Schedule Name" style="background:#2a2a2a; border:1px solid #444; color:white; padding:8px; border-radius:6px; width:100%;">
  </div>
  <div class="modal-row">
    <input type="time" id="modal-start" class="modal-input" style="background:#2a2a2a; border:1px solid #444; color:white; padding:6px; border-radius:6px; flex:1;">
    <span style="color:#666;">~</span>
    <input type="time" id="modal-end"   class="modal-input" style="background:#2a2a2a; border:1px solid #444; color:white; padding:6px; border-radius:6px; flex:1;">
  </div>
  <div id="color-picker"></div>
  <div id="modal-error-msg"></div>
  <button id="btn-save"   class="btn" style="background:#56ccf2; color:black;">Save</button>
  <button id="btn-cancel" class="btn" style="background:#444;">Cancel</button>
  <button id="btn-delete" class="btn" style="background:#ff4757; display:none;">Delete</button>
</div>
<script src="./widget.js"></script>
</body>
</html>
